<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title and Favicon -->
    <title>Github Issue Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Tailwind + Daisy UI -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="../styles/style.css" />
  </head>
  <body>
    <header class="bg-white mb-[60px]">
      <div class="navbar bg-base-100 shadow-sm px-20">
        <div class="flex-1">
          <a class="btn btn-ghost text-xl"
            ><i class="fa-brands fa-github"></i>GitHub Issues Tracker</a
          >
        </div>
        <div class="flex gap-2">
          <label class="input">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input type="search" required placeholder="Search issues..." />
          </label>
          <button class="btn btn-primary">+ New Issue</button>
        </div>
      </div>
    </header>
    <main class="bg-[##F8FAFC] min-h-screen max-w-[75%] mx-auto">
      <section id="tabs" class="p-6 flex gap-2 bg-white mb-4 rounded-lg">
        <button
          onclick="showTab('allTab')"
          id="allTab"
          class="btn tab-btn w-[120px] h-10"
        >
          All
        </button>
        <button
          onclick="showTab('openTab')"
          id="openTab"
          class="btn tab-btn w-[120px] h-10"
        >
          Open
        </button>
        <button
          onclick="showTab('closedTab')"
          id="closedTab"
          class="btn tab-btn w-[120px] h-10"
        >
          Closed
        </button>
      </section>
      <section id="issue-info" class="rounded-lg">
        <div
          class="p-6 flex justify-between items-center bg-white border-b border-[#E4E4E7]"
        >
          <div class="flex gap-2 items-center">
            <div
              class="w-[50px] h-[50px] rounded-full bg-[#ECE4FF] flex items-center justify-center"
            >
              <img class="w-8 h-8" src="../assets/Aperture.png" alt="" />
            </div>
            <div>
              <h3 class="mb-[3px] font-semibold text-xl">
                <span id="total-count">50</span> Issues
              </h3>
              <p>Track and manage your project issues</p>
            </div>
          </div>
          <div class="flex gap-4">
            <div id="open-badge" class="flex items-center gap-2">
              <div class="rounded-full w-3 h-3 bg-[#00A96E]"></div>
              Open
            </div>
            <div id="closed-badge" class="flex items-center gap-2">
              <div class="rounded-full w-3 h-3 bg-[#A855F7]"></div>
              Closed
            </div>
          </div>
        </div>
        <div
          id="card-container"
          class="bg-[#FBFBFB] p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3"
        >
          <!-- Here cards will be shown dynamically fetching data from API -->
        </div>
      </section>
      <section>
        <!-- Modal to display details of issue -->
        <!-- Open the modal using ID.showModal() method -->
        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        </dialog>
      </section>
    </main>
    <script src="../scripts/toggle.js"></script>
    <script src="../scripts/displayIssues.js"></script>
    <script src="../scripts/count.js"></script>
    <script src="../scripts/zzz.js"></script>
  </body>
</html>
